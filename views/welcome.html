<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emotify — Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#05060a;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--text:#f0ece4;--muted:#5a5a6e}
html,body{height:100%;overflow:hidden}
body{font-family:'Syne',sans-serif;background:var(--ink);color:var(--text);cursor:none;display:flex;align-items:center;justify-content:center;text-align:center}
#cur,#cur-ring{display:none}
@media(pointer:fine){
  #cur{display:block;position:fixed;width:8px;height:8px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
  #cur-ring{display:block;position:fixed;width:32px;height:32px;border:1px solid rgba(255,255,255,0.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}
}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.25;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.1'/%3E%3C/svg%3E")}
canvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.4}
.note{position:fixed;font-size:1.2rem;pointer-events:none;z-index:2;animation:floatNote var(--dur,8s) linear var(--delay,0s) infinite;opacity:0;color:rgba(255,255,255,0.08)}
@keyframes floatNote{0%{transform:translateY(110vh) rotate(0deg);opacity:0}10%{opacity:.15}90%{opacity:.08}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}
.glow{position:fixed;width:600px;height:600px;background:radial-gradient(ellipse,rgba(255,255,255,.03),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1}
.inner{position:relative;z-index:10;padding:1.5rem;width:100%;max-width:500px}
.time-label{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;animation:fadeUp .8s .1s ease both}
.greeting{font-family:'Instrument Serif',serif;font-size:clamp(2rem,6vw,5.5rem);font-style:italic;line-height:1;letter-spacing:-2px;animation:fadeUp .8s .25s ease both}
.user-name{font-family:'Instrument Serif',serif;font-size:clamp(2rem,6vw,5.5rem);font-weight:400;display:block;letter-spacing:-2px;color:rgba(255,255,255,.7);animation:fadeUp .8s .4s ease both}
.sub{font-size:.9rem;color:var(--muted);margin:1.25rem auto;max-width:340px;line-height:1.8;animation:fadeUp .8s .55s ease both}
.trial-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.05);border:1px solid var(--border2);padding:.3rem .8rem;border-radius:5px;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--muted);margin-bottom:1rem;animation:fadeUp .8s .6s ease both}
.wave-row{display:flex;justify-content:center;align-items:flex-end;gap:3px;height:28px;margin:1rem 0;animation:fadeUp .8s .65s ease both}
.wave-bar{display:inline-block;width:3px;border-radius:2px;background:rgba(255,255,255,.2);animation:wave var(--d,.8s) ease-in-out infinite alternate;animation-delay:var(--del,0s)}
@keyframes wave{from{height:4px}to{height:var(--h,20px)}}
.btn-next{padding:.9rem 2rem;border-radius:10px;background:var(--text);color:var(--ink);border:none;font-family:'Syne',sans-serif;font-size:.85rem;font-weight:800;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;transition:all .3s;animation:fadeUp .8s .75s ease both;width:100%;max-width:280px}
.btn-next:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(255,255,255,.12)}
.logout{position:fixed;top:1rem;right:1rem;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text);text-decoration:none;border:1px solid var(--border2);padding:.4rem .8rem;border-radius:6px;transition:all .2s;z-index:600;background:rgba(10,12,20,.8);backdrop-filter:blur(10px)}
.logout:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.3)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){
  html,body{overflow-y:auto;height:auto}
  body{align-items:flex-start;padding-top:4rem;padding-bottom:2rem}
  .inner{padding:1rem}
  .wave-row{height:20px}
}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur-ring"></div>
<canvas id="canvas"></canvas>
<div class="glow"></div>
<div id="notes"></div>
<a href="/auth/logout" class="logout">Logout</a>
<div class="inner">
  <div class="time-label" id="time-label">Good evening</div>
  <div class="greeting">Welcome back,</div>
  <div class="user-name" id="user-name">Friend</div>
  <div class="sub">Your emotion is your playlist tonight. Let's find the perfect music for this moment.</div>
  <div id="trial-badge" class="trial-badge" style="display:none">🎵 Free Trial · <span id="trial-days">7</span> days remaining</div>
  <div class="wave-row" id="wave-row"></div>
  <button class="btn-next" onclick="window.location.href='/region'">Choose Your Region →</button>
</div>
<script>
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
(function anim(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim)})();
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let W,H,particles=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
class P{constructor(){this.reset()}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.2+.2;this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.3;this.a=Math.random()*.2+.05;this.life=Math.random()*200+100;this.ml=this.life}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.life<0||this.x<0||this.x>W||this.y<0||this.y>H)this.reset()}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${this.a*(this.life/this.ml)})`;ctx.fill()}}
for(let i=0;i<60;i++)particles.push(new P());
(function anim(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(anim)})();
const notes=['♩','♪','♫','♬','𝄞','♭','♯'];
const nc=document.getElementById('notes');
for(let i=0;i<18;i++){const n=document.createElement('div');n.className='note';n.textContent=notes[Math.floor(Math.random()*notes.length)];n.style.cssText=`left:${Math.random()*100}%;--dur:${8+Math.random()*12}s;--delay:${Math.random()*-15}s`;nc.appendChild(n)}
const wr=document.getElementById('wave-row');
for(let i=0;i<28;i++){const b=document.createElement('span');b.className='wave-bar';b.style.cssText=`--d:${.4+Math.random()*.8}s;--h:${8+Math.random()*24}px;--del:${Math.random()*.5}s`;wr.appendChild(b)}
const h=new Date().getHours();
document.getElementById('time-label').textContent=h<12?'Good morning':h<17?'Good afternoon':h<21?'Good evening':'Good night';
fetch('/api/me').then(r=>r.json()).then(data=>{
  document.getElementById('user-name').textContent=data.name;
  if(data.isTrial){
    const badge=document.getElementById('trial-badge');
    badge.style.display='inline-flex';
    const daysLeft=Math.max(0,7-Math.floor((Date.now()-new Date(data.trialStart))/(1000*60*60*24)));
    document.getElementById('trial-days').textContent=daysLeft;
    if(!data.trialValid) window.location.href='/auth/logout';
  }
}).catch(()=>{});
</script>
</body>
</html>
