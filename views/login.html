<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emotify — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#05060a;--ink2:#0a0c14;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--text:#f0ece4;--muted:#5a5a6e;--green:#1db954;--green2:#1ed760}
html,body{min-height:100%;overflow-y:auto}
body{font-family:'Syne',sans-serif;background:var(--ink);color:var(--text);cursor:none;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:2rem 1.5rem}
#cur,#cur-ring{display:none}
@media(pointer:fine){
  #cur{display:block;position:fixed;width:8px;height:8px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .3s,height .3s}
  #cur-ring{display:block;position:fixed;width:32px;height:32px;border:1px solid rgba(255,255,255,0.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}
}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.25;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.1'/%3E%3C/svg%3E")}
.vinyl{position:fixed;width:600px;height:600px;border-radius:50%;border:1px solid rgba(255,255,255,.03);animation:spin 25s linear infinite;opacity:.05;background:repeating-radial-gradient(circle at 50%,transparent 0,transparent 20px,rgba(255,255,255,.03) 20px,rgba(255,255,255,.03) 21px);pointer-events:none;z-index:1}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.note{position:fixed;font-size:1.2rem;pointer-events:none;z-index:2;animation:floatNote var(--dur,8s) linear var(--delay,0s) infinite;opacity:0;color:rgba(255,255,255,0.08)}
@keyframes floatNote{0%{transform:translateY(110vh) rotate(0deg);opacity:0}10%{opacity:.15}90%{opacity:.08}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}
.wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;width:100%;max-width:440px;padding:0}
.logo{font-family:'Instrument Serif',serif;font-size:clamp(3.5rem,10vw,5rem);font-style:italic;letter-spacing:-3px;line-height:1;margin-bottom:.25rem;margin-top:1rem;animation:fadeUp .8s .2s ease both}
.tagline{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem;animation:fadeUp .8s .4s ease both}
.card{width:100%;background:rgba(10,12,20,.85);border:1px solid var(--border);border-radius:20px;padding:2rem;backdrop-filter:blur(30px);animation:fadeUp .8s .55s ease both;box-shadow:0 40px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04)}
.card-title{font-size:1.2rem;font-weight:700;margin-bottom:.35rem}
.card-sub{font-size:.8rem;color:var(--muted);margin-bottom:2rem;line-height:1.6}
.btn-spotify{width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;padding:.95rem;border-radius:10px;border:none;cursor:pointer;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;transition:all .25s;text-decoration:none}
.btn-spotify:hover{background:var(--green2);transform:translateY(-2px);box-shadow:0 10px 30px rgba(29,185,84,.35)}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0}
.divider hr{flex:1;border:none;border-top:1px solid var(--border)}
.divider span{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;color:var(--muted)}
.trial-form{display:flex;flex-direction:column;gap:.75rem}
.trial-input{width:100%;padding:.85rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Syne',sans-serif;font-size:.875rem;outline:none;transition:border-color .2s}
.trial-input:focus{border-color:var(--border2)}
.trial-input::placeholder{color:var(--muted)}
.btn-trial{width:100%;padding:.85rem;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'Syne',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .25s}
.btn-trial:hover{background:rgba(255,255,255,.05)}
.trial-note{text-align:center;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);margin-top:.75rem;letter-spacing:.08em}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:.75rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){
  .card{padding:1.5rem;border-radius:16px}
  .tagline{margin-bottom:1.5rem}
}
.auth-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.tab{flex:1;padding:.6rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{background:rgba(255,255,255,.07);border-color:var(--border2);color:var(--text)}
.auth-form{display:flex;flex-direction:column;gap:.75rem}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur-ring"></div>
<div class="vinyl"></div>
<div id="notes"></div>
<div class="wrap">
  <div class="logo">Emotify</div>
  <div class="tagline">Music · Emotion · Intelligence</div>
  <div class="card">
    <div class="card-title">Start Listening</div>
    <div class="card-sub">Connect with Spotify to get music based on your real-time emotions.</div>
    <div class="error-msg" id="error-msg"></div>
    <a href="/auth/spotify" class="btn-spotify">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      Continue with Spotify
    </a>
    <div class="divider"><hr/><span>or continue with email</span><hr/></div>
<!-- tabs -->
<div class="auth-tabs">
  <button class="tab active" onclick="switchTab('register')">Register</button>
  <button class="tab" onclick="switchTab('signin')">Sign In</button>
</div>

<div id="register-form" class="auth-form">
  <input class="trial-input" id="reg-name" type="text" placeholder="Your name"/>
  <input class="trial-input" id="reg-email" type="email" placeholder="Email address"/>
  <input class="trial-input" id="reg-password" type="password" placeholder="Password"/>
  <button class="btn-trial" onclick="register()">🎵 Create Account</button>
</div>

<div id="signin-form" class="auth-form" style="display:none">
  <input class="trial-input" id="si-email" type="email" placeholder="Email address"/>
  <input class="trial-input" id="si-password" type="password" placeholder="Password"/>
  <button class="btn-trial" onclick="signin()">→ Sign In</button>
</div>

<div class="trial-note">Free · No credit card · 7 day trial</div>

<div class="divider"><hr/><span>or try free</span><hr/></div>
<div class="trial-form">
  <input class="trial-input" id="trial-name" type="text" placeholder="Enter your name to try free"/>
  <button class="btn-trial" onclick="startTrial()">🎵 Start Free Trial — 7 Days</button>
</div>
<div class="trial-note">YouTube music · No account needed · 7 days free</div>
<script>
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
(function anim(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim)})();
const notes=['♩','♪','♫','♬','𝄞','♭','♯'];
const nc=document.getElementById('notes');
for(let i=0;i<18;i++){const n=document.createElement('div');n.className='note';n.textContent=notes[Math.floor(Math.random()*notes.length)];n.style.cssText=`left:${Math.random()*100}%;--dur:${8+Math.random()*12}s;--delay:${Math.random()*-15}s`;nc.appendChild(n)}
const params=new URLSearchParams(window.location.search);
if(params.get('error')){const em=document.getElementById('error-msg');em.textContent='Spotify login failed. Please try again.';em.style.display='block';}
async function startTrial(){
  const name=document.getElementById('trial-name').value.trim()||'Explorer';
  try{const res=await fetch('/auth/trial',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});const data=await res.json();if(data.success){window.location.href='/welcome';}else{alert('Error: '+data.error);}}catch(err){alert('Error: '+err.message);}
}
function switchTab(tab) {
  document.getElementById('register-form').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('signin-form').style.display = tab === 'signin' ? 'flex' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='register')||(i===1&&tab==='signin')));
}

async function register() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) return showError('Please fill in all fields.');
  try {
    const res = await fetch('/auth/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, email, password}) });
    const data = await res.json();
    if (data.success) window.location.href = '/welcome';
    else showError(data.error);
  } catch(err) { showError('Something went wrong.'); }
}

async function signin() {
  const email = document.getElementById('si-email').value.trim();
  const password = document.getElementById('si-password').value;
  if (!email || !password) return showError('Please fill in all fields.');
  try {
    const res = await fetch('/auth/signin', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
    const data = await res.json();
    if (data.success) window.location.href = '/welcome';
    else showError(data.error);
  } catch(err) { showError('Something went wrong.'); }
}

function showError(msg) {
  const em = document.getElementById('error-msg');
  em.textContent = msg;
  em.style.display = 'block';
  setTimeout(() => em.style.display = 'none', 4000);
}
</script>
</body>
</html>
